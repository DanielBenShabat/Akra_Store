name: Supabase keep-alive

# Supabase pauses free-tier projects after ~1 week without API activity.
# Ping the site's keepalive endpoint (which runs a real DB query) every
# 3 days so the project never goes idle.
#
# Requires the repository variable AKRA_SITE_URL, e.g. https://example.com
# (Settings → Secrets and variables → Actions → Variables).

on:
  schedule:
    - cron: '17 3 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping keepalive endpoint
        run: |
          curl --fail-with-body --silent --show-error \
            --retry 3 --retry-delay 30 --max-time 30 \
            "${{ vars.AKRA_SITE_URL }}/api/keepalive"
