# Self-hosted Umami analytics for the Akra store.
# Runs next to the Next.js app on the VM; see README.md in this folder.
# Bound to 127.0.0.1 only — the public internet reaches it exclusively
# through the nginx /umami/ proxy (tracking script + collector endpoint).

services:
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    ports:
      - '127.0.0.1:3001:3000'
    environment:
      DATABASE_URL: postgresql://umami:${POSTGRES_PASSWORD}@db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${APP_SECRET}
    depends_on:
      db:
        condition: service_healthy
    restart: always

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - umami-db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U umami']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

volumes:
  umami-db:
